name: Build for Linux Aarch64

on: [ push, pull_request, workflow_dispatch ]

jobs:
  build:
    name: CI for Linux
    runs-on: ubuntu-24.04-arm
    container: ubuntu:20.04
    steps:
    - name: Install dependencies for Linux
      env:
        DEBIAN_FRONTEND: noninteractive
        TZ: Etc/UTC
      run: |
        apt-get -qq update
        apt-get install -y -qq --allow-unauthenticated software-properties-common autopoint automake autoconf intltool libc6-dev yasm libglib2.0-bin perl wget zip bzip2 make libtool pkg-config cmake libglib2.0-dev libexpat-dev autogen gcc g++ clang libstdc++-9-dev bsdmainutils openssh-client rsync python texinfo
    - name: Checkout for Linux
      uses: actions/checkout@v1
      with:
        submodules: true
    - name: Build for Linux
      run: TRAVIS_OS_NAME=linux travis/build-aarch64.sh
    - name: Upload to sf.net
      env:
          gh_ed25519_key: ${{ secrets.GH_ENCRYPTED_ED25519_KEY }}
          gh_ed25519_iv: ${{ secrets.GH_ENCRYPTED_ED25519_IV }}
      run: TRAVIS_OS_NAME=linux travis/upload.sh
    - name: Upload Github artifact
      uses: actions/upload-artifact@v4
      with:
        name: ddb-static-deps-aarch64-latest.tar.bz2
        path: _build/ddb-static-deps-aarch64-latest.tar.bz2
        if-no-files-found: error
